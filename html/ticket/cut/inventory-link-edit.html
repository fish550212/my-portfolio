<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />

    <link href="frontcss/index.css" rel="stylesheet" type="text/css" />

  <body class="bg page">
    <div class="wrapper">
      <div class="headerbox">
        <div class="Rtop">
          <div class="logo">
            <img src="frontimages/logo.jpg" />
            <font>
              票交財產APP
              <span>盤點作業</span>
            </font>
          </div>

          <div class="rtop_menugroup">
            <div class="tola">
              <input type="button" value="回首頁" class="input-style" onclick="location.href='index.html'" />
              <input type="button" value="登出" class="input-style" onclick="location.href='login.html'" />
            </div>
          </div>

          <!--MOB-MENU---位置放class="header"內--->
          <!--手機選單-漢堡圖-->
          <div class="mu2 nav-button"><a title="手機選單" class="animate" href="#">MENU</a></div>
          <!--手機選單-END-->
          <!-- Nav手機選單 -->
          <link href="mobmu/common.css" rel="stylesheet" />
          <!--[if gte IE 9]><!-->
          <script src="mobmu/jquery-2.1.3.min.js"></script>
          <!--<![endif]-->
          <script src="mobmu/jquery.mobile-1.4.5.custom.min.js"></script>
          <script src="mobmu/jquery.bxslider-4.1.1.min.js"></script>
          <script src="mobmu/common.js"></script>

          <div class="nav-panel" id="nav">
            <ul class="reset">
              <li>
                <h2>
                  <a href="import-file-link.html" title="轉入檔案">轉入檔案</a>
                </h2>
              </li>
              <li>
                <h2>
                  <a href="inventory-link.html" title="盤點作業">盤點作業</a>
                </h2>
              </li>
              <li>
                <h2>
                  <a href="inventory-result-link.html" title="盤點結果">盤點結果</a>
                </h2>
              </li>
              <li>
                <h2>
                  <a href="index.html" title="首頁">首頁</a>
                </h2>
              </li>
              <li>
                <h2>
                  <a href="login.html" title="登出">登出</a>
                </h2>
              </li>
            </ul>
          </div>
          <!--MOB-MENU--END------------->
        </div>

        <ul class="toptitle">
          <li>
            <a href="import-file-link.html" title="轉入檔案">
              <img src="frontimages/icon-qr.svg" alt="" />
              轉入檔案
            </a>
          </li>
          <li class="active">
            <a href="inventory-link.html" title="盤點作業">
              <img src="frontimages/icon-check.svg" alt="" />
              盤點作業
            </a>
          </li>
          <li>
            <a href="inventory-result-link.html" title="盤點結果">
              <img src="frontimages/icon-weather.svg" alt="" />
              盤點結果
            </a>
          </li>
        </ul>
      </div>

      <div class="mainbox">
        <!-- 內容 -->
        <div class="conterbox">
          <div class="groupbox bg-w bg-shadow">
            <div class="titlebox">
              <div class="title">
                盤點作業<span>/明細</span>
              </div>
            </div>
            <ul class="addbox inputbox">
              <li>
                <div class="box W50">
                  <div class="title">財產編號</div>
                  <input type="text" class="input-style" placeholder="財產編號" value="123456" />
                </div>
                <div class="box W50">
                  <div class="title">財產名稱</div>
                  <input type="text" class="input-style" placeholder="財產名稱" value="筆記型電腦" />
                </div>
              </li>
              <li>
                <div class="box W50">
                  <div class="title">數量</div>
                  <input type="text" class="input-style" placeholder="數量" value="1" />
                </div>
                <div class="box W50">
                  <div class="title">單位</div>
                  <input type="text" class="input-style" placeholder="單位" value="行政單位" />
                </div>
              </li>
              <li>
                <div class="box W50">
                  <div class="title">部門</div>
                  <input type="text" class="input-style" placeholder="部門" value="管理部" />
                </div>
                <div class="box W50">
                  <div class="title">位置</div>
                  <input type="text" class="input-style" placeholder="位置" value="抽屜" />
                </div>
              </li>
              <li>
                <div class="box W50">
                  <div class="title">保管人</div>
                  <input type="text" class="input-style" placeholder="保管人" value="Amy" />
                </div>
                <div class="box W50">
                  <div class="title">盤點人</div>
                  <input type="text" class="input-style" placeholder="盤點人" value="Max" />
                </div>
              </li>
              <li>
                <div class="box W50">
                  <div class="title">時間</div>
                  <input type="text" class="input-style" placeholder="時間" value="2024-06-01 09:00" />
                </div>
                <div class="box W50">
                  <div class="title">備註</div>
                  <input type="text" class="input-style" placeholder="備註" />
                </div>
              </li>
            </ul>

            <div class="btnbox bottombox">
              <input type="button" class="btn-style btn-archive btn-c-blue W50" value="存檔" />
              <input type="button" class="W50 btn-style btn-archive btn-c-gray-deep W50" value="清除" />
              <input type="button" class="W50 btn-style btn-archive btn-c-black-deep W50" value="返回" onclick="history.back()"/>

            </div>
          </div>
        </div>
        <!-- 內容 -->
      </div>
    </div>
  </body>
