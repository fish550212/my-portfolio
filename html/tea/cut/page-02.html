      <div class="mainbox">
        <!-- 內容 -->
        <div class="conterbox">
          <div class="groupbox bg-w bg-shadow">
            <div class="titlebox">
              <div class="title">調查紀錄</div>
            </div>

            <ul class="addbox inputbox">
              <li>
                <div class="box W50">
                  <div class="title">日期</div>
                  <input type="text" class="input-style" />
                </div>
                <div class="box W50">
                  <div class="title">地點</div>
                  <select class="input-style" name="" id="">
                    <option value="">地點</option>
                    <option value="">地點</option>
                    <option value="">地點</option>
                  </select>
                </div>
              </li>
              <li>
                <div class="box W50">
                  <div class="title">調查階段</div>
                  <input type="text" class="input-style" />
                </div>
                <div class="box W50">
                  <div class="title">調查項目</div>
                  <select class="input-style" name="" id="">
                    <option value="">調查項目</option>
                  </select>
                </div>
              </li>

              <li>
                <div class="box W50">
                  <div class="title">相片上傳</div>
                  <input type="file" class="input-style" />
                  <input type="file" class="input-style" />
                </div>
                <div class="box W50">
                  <div class="title">照片解說</div>
                  <input type="text" class="input-style" placeholder="內容" />
                  <input type="text" class="input-style" placeholder="內容" />
                </div>
              </li>
            </ul>

            <div class="titlebox green_line">
              <img src="frontimages/icon-leaf.svg" alt="" />
              <div class="title">植株</div>
            </div>
            <ul class="addbox inputbox">
              <li>
                <div class="box W50">
                  <div class="title">生長勢</div>
                  <select class="input-style" name="" id="">
                    <option value="">強</option>
                    <option value="">中</option>
                    <option value="">弱</option>
                  </select>
                </div>
                <div class="box W50">
                  <div class="title">茶芽密度</div>
                  <select class="input-style" name="" id="">
                    <option value="">強</option>
                    <option value="">中</option>
                    <option value="">弱</option>
                  </select>
                </div>
              </li>
            </ul>

            <div class="titlebox green_line">
              <img src="frontimages/icon-leaf.svg" alt="" />
              <div class="title">葉</div>
            </div>
            <ul class="addbox inputbox">
              <li>
                <div class="box W50">
                  <div class="title">一心一葉期</div>
                  <select class="input-style" name="" id="">
                    <option value="">強</option>
                    <option value="">中</option>
                    <option value="">弱</option>
                  </select>
                </div>
                <div class="box W50">
                  <div class="title">茶芽葉柄基部花青素顏色</div>
                  <select class="input-style" name="" id="">
                    <option value="">有</option>
                    <option value="">無</option>
                  </select>
                </div>
              </li>
              <li>
                <div class="box W50">
                  <div class="title">葉片形狀</div>
                  <select class="input-style" name="" id="">
                    <option value="">長橢圓形</option>
                  </select>
                </div>
                <div class="box W50">
                  <div class="title">葉面曲度</div>
                  <select class="input-style" name="" id="">
                    <option value="">平坦</option>
                  </select>
                </div>
              </li>
              <li>
                <div class="box W50">
                  <div class="title">葉緣形態</div>
                  <select class="input-style" name="" id="">
                    <option value="">中波浪</option>
                  </select>
                </div>
                <div class="box W50">
                  <div class="title">葉基形狀</div>
                  <select class="input-style" name="" id="">
                    <option value="">漸尖形</option>
                  </select>
                </div>
              </li>
            </ul>

            <div class="titlebox green_line">
              <img src="frontimages/icon-leaf.svg" alt="" />
              <div class="title">花</div>
            </div>
            <ul class="addbox inputbox">
              <li>
                <div class="box W50">
                  <div class="title">花柄長度</div>
                  <select class="input-style" name="" id="">
                    <option value="">中(9.36-1.09mm)</option>
                  </select>
                </div>
                <div class="box W50">
                  <div class="title">花冠直徑</div>
                  <select class="input-style" name="" id="">
                    <option value="">中小(34.3-2.5mm)</option>
                  </select>
                </div>
              </li>
              <li>
                <div class="box W50">
                  <div class="title">花柱長度</div>
                  <select class="input-style" name="" id="">
                    <option value="">短(11.6-0.8mm)</option>
                  </select>
                </div>
              </li>
            </ul>
            <div class="btnbox">
              <input type="button" class="input-style btn-archive btn-c-black-deep W50" value="存檔" />
              <input type="button" class="W50 input-style btn-archive btn-c-gray-deep W50" value="清除" />
            </div>
