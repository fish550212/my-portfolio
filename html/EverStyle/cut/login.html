<head>

    <script language=javascript>
        function checkdata() {
            var errmsg = "";
            if (document.form1.account.value == "") {
                errmsg = "請輸入帳號\n";
            }
            if (document.form1.passwd.value == "") {
                errmsg = errmsg + "請輸入密碼";
            }
            if (errmsg != "") {
                alert(errmsg)
                return false
            }
        }
    </script>
</head>
  
<body >
    <form action="../admin/login.php" id="form1" name="form1" onsubmit="return checkdata()" method="post">
        <div class="main"><div class="mainbox">
          <div class="mainboxin">
            <div class="corner01">&nbsp;</div><div class="corner02">&nbsp;</div><div class="corner03">&nbsp;</div><div class="corner04">&nbsp;</div>
            <div class="login">
            <div><img src="Images/everstyle.png" width="255" height="auto" alt="LOGO"></div>
            <div class="logintitle">柏泰金牌業務<BR/>銷售顧問服務管理系統</div>
            <div align="center"><input Value="mark" class="form_text icon01" data-val="true" data-val-required="請輸入帳號" id="account" name="account" type="text" /></div>
            <div align="center"><input Value="a123456" autocomplete="off" class="form_text icon02" data-val="true" data-val-required="密碼 欄位是必要項。" id="passwd" name="passwd" type="password" /></div>
            <div align="center"><input name="Login" type="submit" id="Login" value="登 入" class="button" /><input name="clean" type="reset" id="clean" value="清 除" class="button" /></div>
            </div>

        </div></div></div>

    </form>
</body>
</html>
