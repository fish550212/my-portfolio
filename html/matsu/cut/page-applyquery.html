    <script>
      function save_currentSlide() {
        this.currentSlide_1 = null;
        this.set_1 = function (num) {
          this.currentSlide_1 = num;
        };
        this.get_1 = function () {
          return this.currentSlide_1;
        };
        this.currentSlide_2 = null;
        this.set_2 = function (num) {
          this.currentSlide_2 = num;
        };
        this.get_2 = function () {
          return this.currentSlide_2;
        };

        this.set_paging_OL_Event = function (slider) {
          const CurrentSlide_X = this;
          const slides_a_all = slider.slides.children();
          const paging_OL_a_all = slider.controlNav;
          const paging_UL_a_all = slider.directionNav;

          $.each(slider.controlNavScaffold.find("li"), function (index, val) {
            let slides_a = slides_a_all[index];
            if (slides_a.title != "") {
              let content = slides_a.title.replace("開新視窗,", "");
              $(this).children().attr("title", slides_a.title);
              $(this).children().html(content);
            }
            $(this).keydown(function (event) {
              if (event.which == 13) {
                slides_a.click();
              }
            });
          });

          //離開 1
          paging_UL_a_all[1].addEventListener("keydown", function (event) {
            if (event.which === 9) {
              CurrentSlide_X.currentSlide_2 = slider.currentSlide;
              slider.animatingTo = CurrentSlide_X.currentSlide_1;
              slider.currentSlide = CurrentSlide_X.currentSlide_1;
              slider.play();
            }
          });

          //離開 2
          $("body").click(function () {
            let sliderIsFocus = false;
            for (let i = 0; i < slides_a_all.length; i++) {
              sliderIsFocus |= slides_a_all[i] === document.activeElement;
            }
            for (let i = 0; i < paging_OL_a_all.length; i++) {
              sliderIsFocus |= paging_OL_a_all[i] === document.activeElement;
            }
            for (let i = 0; i < paging_UL_a_all.length; i++) {
              sliderIsFocus |= paging_UL_a_all[i] === document.activeElement;
            }
            if (!sliderIsFocus && !slider.playing) {
              CurrentSlide_X.currentSlide_2 = slider.currentSlide;
              slider.animatingTo = CurrentSlide_X.currentSlide_1;
              slider.currentSlide = CurrentSlide_X.currentSlide_1;
              slider.play();
            }
          });
        };
      }
    </script>

            <script>
              const tabs = document.querySelectorAll(".title-list a");
              const contents = document.querySelectorAll(".tab-content");

              tabs.forEach((tab) => {
                tab.addEventListener("click", function (e) {
                  e.preventDefault();

                  // 移除所有 active
                  tabs.forEach((t) => t.classList.remove("active"));
                  contents.forEach((c) => c.classList.remove("active"));

                  // 加上目前這個 active
                  this.classList.add("active");
                  const tabId = this.getAttribute("data-tab");
                  document.getElementById(tabId).classList.add("active");
                });
