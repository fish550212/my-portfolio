<div id="posts" class="grid"></div>
<style>
.grid {
  column-count: 3;

.grid-item {
  break-inside: avoid;

  background: white;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);

}

  .card{break-inside: avoid;

  .content{padding:12px 14px;font:14px/1.6 system-ui,"Noto Sans TC"}
  .meta{color:#666;font-size:12px;margin-top:6px}
</style>

   {id:"590658891006862", token:"EAA7IZBAiB3j4BPdERJjaxBtBxHB6X6aJLRHsic1HsLFIJyZCI7juEsM2oZAkf7rtkwMrxCNuCplcXbGVrZB6dxznRmZBdtA4v9020ZC3mk7vIA9Yjl6AdZAdWErbkgdybXMZB0gu9TFpFtWTqjLSZCtje7mLtrtg7Q10lfivgvbZCu1sNnwvddiPOk4f5Ye0qXeUJ3D8oSEdDO"},

];
const FIELDS = [
  "id","message","created_time","permalink_url","full_picture",
  "reactions.type(LIKE).summary(true).limit(0)",
  "comments.summary(true).limit(0)",
  "shares"
].join(",");

Promise.all(PAGES.map(p =>
  fetch(`https://graph.facebook.com/v23.0/${p.id}/posts?fields=${FIELDS}&access_token=${p.token}`)
    .then(r=>r.json()).then(j => (j.data||[]).map(post => ({...post, page_id:p.id})))
)).then(results=>{
  // 合併 + 依時間排序
  const allPosts = results.flat().sort((a,b)=> new Date(b.created_time)-new Date(a.created_time));
  render(allPosts);
});

function render(posts){
  const box=document.getElementById("posts");
  const fmt = new Intl.DateTimeFormat("zh-TW",{dateStyle:"medium",timeStyle:"short"});
  box.innerHTML = posts.map(p=>{
    const like=p.reactions?.summary?.total_count??0;
    const cmt=p.comments?.summary?.total_count??0;
    const share=p.shares?.count??0;
    return `
   
        <div class="grid-item">
        <div class="media">
          ${p.full_picture? `<img src="${p.full_picture}">` : ""}
        </div>
        <div class="content">
          <div>${p.message||"(無文字)"}</div>
          <div class="meta">${fmt.format(new Date(p.created_time))}
            ・👍 ${like} ・💬 ${cmt} ・↗ ${share}
          </div>
          <a href="${p.permalink_url}" target="_blank">查看原文</a>
        </div></div>`;
  }).join("");
}
</script>
