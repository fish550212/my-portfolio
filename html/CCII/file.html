<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
     <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=7,9,10,11" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>拖曳/按鈕上傳</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

      .file-style {
        display: inline-block;
        position: relative;
        width: 100%;
        height: 120px;
        border: 1px dashed #ccc;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
        background: url(frontimages/image-01.svg)no-repeat center;
        background-size: 40px auto;
      }
   
      .file-style::after{
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        content: "拖曳或點擊上傳";
        color: #b0b0b0;
      }
      
      .file-style input[type="file"] {
        width: 100%; 
        height: 100%;
        background: transparent;
        cursor: pointer;
      }

      .file-style input[type="file"]::file-selector-button {
        display: none;
        color: #fff;
        cursor: pointer;
      }
   
    </style>
  </head>
  <body>
    <div class="file-style">
      <input type="file" id="bimg" />
    </div>
  </body>
</html>
