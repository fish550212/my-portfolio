<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>采昌資訊入口網</title>
    <style type="text/css">
      * {
        margin: 0;
        padding: 0;
        font-size: 18px;
        -webkit-box-sizing: border-box;
        -moz-box-sizing: border-box;
        box-sizing: border-box;
        font-family: "Noto Sans TC", Helvetica, Arial, "微軟正黑體", sans-serif;

      }
      body {
        margin: 0px auto;
        font-family: "Noto Sans TC", "新細明體", "細明體", Arial, Helvetica, sans-serif;
        background: url(frontimages/oa-bg.png) no-repeat fixed top center;
        background-size: 100% auto;
        color: #1f1f1f;
        width: 100%;
        height: 100%;
      }

      .main {
        margin: 0px auto 0px auto;
        width: 100%;
        height: 100vh;
        position: relative;
      }
    
      td {
        text-align: center;
      }
      .login {
        position: absolute;
        width: 450px;
        padding: 50px 0;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        background-color: #fff;
        box-shadow: 0 6px 6px 0px #00000018;
      }
      table {
        width: 280px;
        margin: auto;
        color: #404040;
      }
      .logo {
        width: 100%;
        margin: auto;
      }
      .title {
        padding: 20px 0 10px 0;
        color: #727272;
        font-size: 22px;
      }
      .fonttext {
        position: absolute;
        left: 680px;
        top: 510px;
        width: 290px;
        color: #fff1be;
        font-weight: 500;
      }

      .form_text {
        padding: 10px 12px;
        border-radius: 3px;
        margin: 6px 0;
        width: 100%;
        font-size: 18px;
        background-color: #fff;
        border: 1px solid #c8c8c8;
      }
      .form_text::placeholder {
        color: #b5b5b5;
      }
      .form_text1 {
        padding: 8px 10px;
        width: 80%;
        background-color: #fffbec;
        color: #785a20;
      }

      .got,
      .got a {
        color: #6bb22a;
        text-decoration: none;
        font-family: Arial, Helvetica, sans-serif;
      }

      .got:hover {
        color: #000;
        text-decoration: underline;
      }

      .footer {
        margin: 0px auto;
        width: 100%;
        height: 150px;
        background-color: #f4f4f4;
        background: linear-gradient(#f4f4f4 10%, #ffffff 100%);
      }

      .footer .inf {
        width: 1020px;
        margin: 0px auto;
        color: #acacac;
        padding-top: 30px;
        letter-spacing: 1px;
        line-height: 200%;
      }
      td:has(.button) {
        display: flex;
        gap: 10px;
      }
      .button,
      a .button {
        color: #fff;
        padding: 6px 20px;
        width: calc(100% / 2);
        height: 50px;
        margin: 6px 0px 10px 0px;
        border-radius: 3px;
        text-decoration: none;
        border: 0px;
        background: #404040;
        cursor: pointer;
        font-weight: 500;
      }
      .button:last-child {
        background-color: #bdbdbd;
      }
      .button:hover {
        color: #fff;
        text-decoration: none;
        background-color: #2a2a2a;
      }
    </style>
  </head>

  <body>
    <div class="main">
      <div class="login">
        <table width="100%" border="0" cellspacing="0" cellpadding="5">
          <tr>
            <td>
              <img class="logo" src="../frontimages/logo.svg" alt="" />
            </td>
          </tr>
          <tr>
            <td align="center" class="title">網站後台管理系統</td>
          </tr>
          <tr>
            <td align="left">
              <input
                class="form_text"
                data-val="true"
                data-val-required="請輸入帳號"
                id="UserName"
                name="UserName"
                placeholder="請輸入帳號"
                type="text"
                value=""
                data-sharkid="__0"
              />
            </td>
          </tr>
          <tr>
            <td align="left">
              <input
                class="form_text"
                data-val="true"
                data-val-required="密碼 欄位是必要項。"
                id="Password"
                name="Password"
                placeholder="請輸入密碼"
                type="password"
                data-sharkid="__1"
              />
            </td>
          </tr>

          <tr>
            <td align="left">
              <input name="Login" type="submit" id="Login" placeholder="" value="登 入" class="button" />
              <input name="clean" type="reset" id="clean" value="清 除" class="button" />
            </td>
          </tr>
        </table>
      </div>
    </div>
  </body>
</html>
