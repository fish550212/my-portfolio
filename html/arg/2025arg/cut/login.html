<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=7,9,10,11" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>國立海洋科技博物館-ARG實境解謎遊戲平台</title>
    <link href="frontcss/index.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <!---------hearder---------------->
    <div class="wrapper">
      <div class="header">
        <div class="headerbox">
          <div class="logo">
            <a href="index.html" target="_self" title="回首頁">
              <div class="logo_img">
                <img src="frontimages/logo.svg" alt="logo" />
              </div>
              ARG實境解謎遊戲平台
            </a>
          </div>

          <!--topmenu-->
          <div class="topmenu">
            <script type="text/javascript" src="https://code.jquery.com/jquery-latest.min.js"></script>
            <script type="text/javascript">
              $(function () {
                // 幫 #menu li 加上 hover 事件
                $("#menu>li").hover(
                  function () {
                    // 先找到 li 中的子選單
                    var _this = $(this),
                      _subnav = _this.children("ul");

                    // 變更目前母選項的背景顏色
                    // 同時顯示子選單(如果有的話)
                    //_this.css('backgroundColor', '#000');
                    _subnav.css("display", "block");
                  },
                  function () {
                    // 變更目前母選項的背景顏色
                    // 同時隱藏子選單(如果有的話)
                    // 也可以把整句拆成上面的寫法
                    $(this).css("backgroundColor", "").children("ul").css("display", "none");
                  }
                );

                // 取消超連結的虛線框
                //$('a').focus(function(){
                //  this.blur();
                //});
              });
            </script>
            <ul id="menu">
              <li>
                <a href="index.html" title="遊戲列表">遊戲列表</a>
              </li>
              <li>
                <a href="text.html" title="會員專區">會員專區</a>
              </li>
            </ul>

            <div class="searchbox">
              <input type="search" class="input-search" placeholder="搜尋" />
              <a href="#" class="btn-search"><img src="frontimages/search.svg" alt="搜尋" /></a>
            </div>
          </div>

          <!--------topmenu-end-------->

          <!--MOB-MENU---位置放class="header"內--->
          <!--手機選單-漢堡圖-->
          <div class="mu2 nav-button"><a title="手機選單" class="animate" href="#">MENU</a></div>
          <!--手機選單-END-->
          <!-- Nav手機選單 -->
          <link href="mobmu/common.css" rel="stylesheet" />
          <!--[if gte IE 9]><!-->
          <script src="mobmu/jquery-2.1.3.min.js"></script>
          <!--<![endif]-->
          <script src="mobmu/jquery.mobile-1.4.5.custom.min.js"></script>
          <script src="mobmu/jquery.bxslider-4.1.1.min.js"></script>
          <script src="mobmu/common.js"></script>

          <div class="nav-panel" id="nav">
            <ul class="linkgroup">
              <li class="searchbox">
                <input type="search" class="input-search" placeholder="搜尋" />
                <a href="#" class="btn-search"><img src="frontimages/search.svg" alt="搜尋" /></a>
              </li>
            </ul>
            <ul class="reset">
              <li>
                <h2>
                  <a href="index.html" title="遊戲列表">遊戲列表</a>
                </h2>
              </li>
              <li>
                <h2>
                  <a href="text.html" title="會員專區">會員專區</a>
                </h2>
              </li>
            </ul>
          </div>
          <!--MOB-MENU--END------------->
        </div>
      </div>
      <!---------hearder-end--------------->

      <!--article------------------>
      <div class="article">
        <!----------------內容-->
        <div class="articlebox">
          <div class="page-section shopform-section">
            <div class="sectionbox">
              <div class="section-title blackfont flex-center">會員專區</div>

              <ul class="login-group">
                <li class="formlist">
                  <b>
                    <span class="font-mark">＊</span>
                    身份
                  </b>
                  <div class="check-box">
                    <label class="check-box-in">
                      <input type="checkbox" name="gender" id="" />
                      <span class="text">會員(學生)</span>
                    </label>
                    <label class="check-box-in">
                      <input type="checkbox" name="gender" id="" />
                      <span class="text">設計者(老師)</span>
                    </label>
                    
                  </div>
                </li>
                <li class="formlist">
                  <b>
                    <span class="font-mark">＊</span>
                    帳號
                  </b>
                  <input type="text" placeholder="輸入姓名" class="text-input" />
                </li>
                <li class="formlist">
                  <b>
                    <span class="font-mark">＊</span>
                    密碼
                  </b>
                  <input type="text" placeholder="輸入姓名" class="text-input" />
                </li>
                <li class="formlist">
                  <b>
                    <span class="font-mark">＊</span>
                    姓名
                  </b>
                  <input type="text" placeholder="輸入姓名" class="text-input" />
                </li>
                
                <li class="formlist">
                  <b>身分證號</b>
                  <input type="text" placeholder="輸入姓名" class="text-input" />
                </li>
                <li class="formlist">
                  <b>性別</b>
                  <div class="check-box">
                    <label class="check-box-in">
                      <input type="radio" name="gender" id="" />
                      <span class="text">男</span>
                    </label>
                    <label class="check-box-in">
                      <input type="radio" name="gender" id="" />
                      <span class="text">女</span>
                    </label>
                  </div>
                </li>
                <li class="formlist">
                  <b>生日</b>
                  <input type="date" class="text-input" name="gender" id="" />
                </li>

                <li class="formlist">
                  <b>
                    <span class="font-mark">＊</span>
                    手機/電話
                  </b>
                  <input type="text" placeholder="輸入電話" class="text-input" />
                </li>
                <li class="formlist">
                  <b>
                    <span class="font-mark">＊</span>
                    電子信箱
                  </b>
                  <input type="text" placeholder="輸入電子信箱" class="text-input" />
                </li>
                <li class="formlist width100">
                  <b>
                    <span class="font-mark">＊</span>
                    主旨
                  </b>
                  <input type="text" placeholder="輸入主旨" class="text-input" />
                </li>
                <li class="formlist width100">
                  <b>
                    <span class="font-mark">＊</span>
                    內容
                  </b>
                  <textarea class="text-input" rows="2" placeholder="輸入詳細內容"></textarea>
                </li>
                <li>
                  <div class="btnbox">
              <input type="submit" value="送出" class="btnbtn">
              <input type="reset" value="清除" class="btnbtn">
            </div>
                </li>
              </ul>
            </div>
          </div>
          <!----------------內容end-->
        </div>
      </div>
    </div>
    <!--footer--------------------->
    <div class="footer">
      <div class="footerbox">國立海洋科技博物館-ARG實境解謎遊戲平台 版權所有 © 2025 隱私及安全政策</div>
    </div>
    <!--footer-end------------------>

    <div id="TOP">
      <img src="frontimages/gotop.svg" alt="回到上面" />
    </div>
    <script type="text/javascript" src="frontjs/gotop.js"></script>
  </body>
</html>
