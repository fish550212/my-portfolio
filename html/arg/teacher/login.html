<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta http-equiv="X-UA-Compatible" content="IE=7,9,10,11" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>後台改版</title>
    <link rel="stylesheet" type="text/css" href="argtercss/login.css" />
    <!--[if lt IE 9]>
<script src="http://html5shim.googlecode.com/svn/trunk/html5.js"></script>
<![endif]-->
    <script language=javascript>
        function checkdata() {
            var errmsg = "";
            if (document.form1.account.value == "") {
                errmsg = "請輸入帳號\n";
            }
            if (document.form1.passwd.value == "") {
                errmsg = errmsg + "請輸入密碼";
            }
            if (errmsg != "") {
                alert(errmsg)
                return false
            }
        }
    </script>
</head>

<body>
    <form action="../admin/login.php" id="form1" name="form1" onsubmit="return checkdata()" method="post">
        <div class="main">
            <div class="mainbox">
                <div class="mainboxin">
                    
                    <div class="login">
                        <div><img src="argterimages/login-logo.png" width="255" height="auto" alt="LOGO"></div>
                        <div class="logintitle">學習體驗平台<div class="logintitle02">教師入口</div></div>
                        <div class="inputbox icon01" align="center">
                            <input Value="mark" class="form_text" data-val="true"
                                data-val-required="請輸入帳號" placeholder="請輸入帳號" id="account" name="account" type="text" />
                            </div>
                        <div class="inputbox icon02" align="center"><input Value="a123456" autocomplete="off" class="form_text"
                                data-val="true" data-val-required="密碼 欄位是必要項。" placeholder="請輸入密碼" id="passwd" name="passwd"
                                type="password" /></div>
                        <div align="center"><input name="Login" type="submit" id="Login" value="登 入"
                                class="button" /><input name="clean" type="reset" id="clean" value="清 除"
                                class="button" /></div>
                    </div>

                </div>
            </div>
        </div>

    </form>
</body>

</html>
